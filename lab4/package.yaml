name:                lab4
version:             0.1.0.0

dependencies:
- base >= 4.7 && < 5
- mtl

library:
  source-dirs: src

executables:
  lab4-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - lab4

tests:
  lab4-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - lab4